<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hero Section</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body class="overflow-x-hidden">

<!-- HERO WRAPPER -->
<div class="text-black flex flex-col lg:flex-row items-center lg:items-start justify-between gap-10 lg:gap-20 pt-20 lg:pt-60 px-6 family-serif">

    <!-- LEFT CONTENT -->
    <div class="max-w-xl">

        <p class="text-base font-bold pb-5">
            Ready to Use Tailwind CSS Web Template
        </p>

        <h1 class="text-2xl md:text-3xl lg:text-4xl font-bold">
            Tailwind Template for <span class="text-blue-300/90"><br>App & Software</span> site.
        </h1>

        <p class="mt-4 text-gray-700">
            All one Tailwind CSS site template for App and Software sites comes with all essential components.
        </p>

        <!-- BUTTONS -->
        <div class="flex flex-col sm:flex-row gap-5 mt-10">

            <button class="bg-black text-white inline-flex items-center px-8 py-3 rounded-lg">
                Download Now
                <img src="/assignment/image/dash.png" class="w-6 mx-3">
            </button>

            <div class="flex items-center gap-3">
                <img src="/assignment/image/play.png" class="w-10">
                <h3 class="text-sm">
                    Watch Demo <br> See how it Works
                </h3>
            </div>

        </div>
    </div>

    <!-- RIGHT CIRCLE SECTION -->
    <div class="relative w-[280px] h-[300px] md:w-[380px] md:h-[400px] lg:w-[430px] lg:h-[460px] flex items-center justify-center">

        <!-- CIRCLE BACKGROUND -->
        <div class="absolute inset-0 bg-indigo-300/70 rounded-full"></div>

        <!-- SPARKLES -->
        <div class="absolute -top-4 -right-4 md:-top-6 md:-right-6 text-indigo-500 text-xl md:text-3xl z-20">✦</div>
        <div class="absolute top-4 -right-6 md:top-6 md:-right-10 text-green-400 text-sm md:text-base z-20">✦</div>

        <!-- WAVE ICON -->
        <i class="fa-solid fa-water absolute -left-4 md:-left-8 bottom-1/3 text-xl md:text-3xl z-20"
           style="color: rgba(243, 9, 91, 0.74);"></i>

        <!-- HERO IMAGE (floating / slightly outside feel) -->
        <img src="/assignment/image/hero-light.png"
             class="absolute w-[180px] md:w-[220px] lg:w-[280px] object-contain z-30 drop-shadow-2xl">

    </div>

</div>

</body>
</html>
