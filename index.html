<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>App & Software Hero</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#f5f5f5]">

  <main class="w-full">
    <section class="max-w-[1120px] mx-auto px-6 pt-[88px] pb-[70px]">
      <div class="grid lg:grid-cols-[520px_420px] items-center justify-between gap-x-[90px]">

        <!-- LEFT SIDE -->
        <div>
          <p class="text-[#20284a] text-[18px] md:text-[19px] font-semibold mb-7">
            Ready to Use Tailwind CSS Web Template.
          </p>

          <h1 class="text-[#1b2148] font-bold leading-[1.1] tracking-[-1px] text-[44px] sm:text-[52px] lg:text-[58px]">
            Tailwind Template for
            <br />
            <span class="text-[#9ea4ff]">App &amp; Software</span> Site.
          </h1>

          <p class="mt-7 text-[#7f8798] text-[16px] leading-[2] max-w-[500px]">
            All in one Tailwind CSS site template for - App and Software
            sites Comes with all essential components.
          </p>

          <div class="mt-10 flex flex-wrap items-center gap-5">

            <!-- Download button -->
            <a href="#"
              class="h-[56px] px-7 rounded-[10px] bg-[#1d2247] text-white flex items-center gap-5">
              <span class="text-[16px] font-medium">Download Now</span>
              <span class="w-px h-6 bg-white/30"></span>

             <img 
  src="/dash.png" 
  alt="Apple icon" 
  class="w-5 h-5 object-contain"
/>
            </a>

            <!-- Watch Demo -->
            <a href="#" class="flex items-center gap-4 text-[#20284a]">
              <span class="w-[50px] h-[50px] rounded-full border-2 border-[#20284a] flex items-center justify-center shrink-0">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 384 512" class="w-4 h-4 fill-[#20284a] ml-[2px]">
                  <path d="M73 39c-14.8-8.8-33.3-9-48.3-.4S0 64.1 0 81v350c0 16.9 9.4 32.5 24.6 40.4s33.5 8.4 48.3-.4l288-175c14.3-8.7 23.1-24.2 23.1-41s-8.8-32.2-23.1-41L73 39z"/>
                </svg>
              </span>

              <span class="leading-tight">
                <span class="block text-[15px] font-medium">Watch Demo</span>
                <span class="block text-[15px] font-semibold mt-2">See how it works</span>
              </span>
            </a>

          </div>
        </div>

        <!-- RIGHT SIDE -->
        <div class="relative h-[470px] flex items-center justify-center lg:justify-end">

          <!-- Purple circle -->
          <div class="absolute top-[20px] right-[10px] w-[430px] h-[430px] rounded-full bg-[#aab1ff]"></div>

          <!-- Stars -->
          <div class="absolute top-[30px] right-[38px] text-[#6f7cff] text-[34px] leading-none z-20">✦</div>
          <div class="absolute top-[87px] right-[16px] text-[#44d8d2] text-[22px] leading-none z-20">✦</div>

       <!-- Pink wave -->
<div class="absolute left-[-22px] bottom-[50px] z-20">
  <svg
    width="62"
    height="34"
    viewBox="0 0 62 34"
    fill="none"
    xmlns="http://www.w3.org/2000/svg"
  >
    <path d="M2 4C5 1 9 1 12 4C15 7 19 7 22 4C25 1 29 1 32 4C35 7 39 7 42 4C45 1 49 1 52 4C55 7 59 7 62 4" stroke="#ff6fae" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M2 12C5 9 9 9 12 12C15 15 19 15 22 12C25 9 29 9 32 12C35 15 39 15 42 12C45 9 49 9 52 12C55 15 59 15 62 12" stroke="#ff6fae" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M2 20C5 17 9 17 12 20C15 23 19 23 22 20C25 17 29 17 32 20C35 23 39 23 42 20C45 17 49 17 52 20C55 23 59 23 62 20" stroke="#ff6fae" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M2 28C5 25 9 25 12 28C15 31 19 31 22 28C25 25 29 25 32 28C35 31 39 31 42 28C45 25 49 25 52 28C55 31 59 31 62 28" stroke="#ff6fae" stroke-width="2.5" stroke-linecap="round"/>
  </svg>
</div>

          <!-- Phone image -->
          <img
            src="/hero-light.png"
            alt="App phone mockup"
            class="relative z-10 w-[315px] md:w-[310px] object-contain lg:right-[70px] lg:top-[40px]"
          />
        </div>

      </div>
    </section>
  </main>

</body>
</html>
